<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seru Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080d;--text:#f3f3f7;--muted:#9a9aae;--faint:#6b6b80;
  --surface:rgba(255,255,255,.045);--surface2:rgba(255,255,255,.075);--border:rgba(255,255,255,.10);
  --accent:#7c5cff;--accent2:#ff5c8a;--accent3:#43e5ff;
  --grad:linear-gradient(120deg,#7c5cff,#ff5c8a 55%,#43e5ff);
  --radius:18px;--maxw:1120px;
  --font:'Inter',system-ui,-apple-system,sans-serif;--display:'Space Grotesk','Sora',var(--font);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:radial-gradient(1200px 800px at 72% -10%,rgba(124,92,255,.20),transparent 60%),radial-gradient(900px 700px at -5% 18%,rgba(67,229,255,.12),transparent 55%),var(--bg);color:var(--text);font-family:var(--font);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{max-width:100%;display:block;}
a{color:inherit;}
h1,h2,h3{margin:0;}
.container{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

/* NAV */
.nav{position:sticky;top:0;z-index:40;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(8,8,13,.55);border-bottom:1px solid var(--border);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;max-width:var(--maxw);margin:0 auto;}
.brand-name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.02em;}
.brand-logo{height:36px;width:auto;}
.nav-links{display:flex;gap:28px;}
.nav-links a{font-size:14px;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--text);}
@media(max-width:720px){.nav-links{display:none;}}

/* HERO */
.hero{position:relative;min-height:94vh;display:flex;align-items:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;z-index:0;}
.hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(8,8,13,.25),rgba(8,8,13,.72) 72%,var(--bg));}
.hero-video{position:absolute;inset:0;overflow:hidden;}
.hero-video iframe{position:absolute;top:50%;left:50%;width:177.78vh;height:56.25vw;min-width:100%;min-height:100%;transform:translate(-50%,-50%);pointer-events:none;border:0;}
.hero-video-el{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-orbs span{position:absolute;border-radius:50%;filter:blur(64px);opacity:.55;animation:float 16s ease-in-out infinite;}
.hero-orbs span:nth-child(1){width:440px;height:440px;background:#7c5cff;top:-70px;left:-50px;}
.hero-orbs span:nth-child(2){width:380px;height:380px;background:#ff5c8a;bottom:-90px;right:-20px;animation-delay:-5s;}
.hero-orbs span:nth-child(3){width:320px;height:320px;background:#43e5ff;top:28%;right:22%;animation-delay:-9s;}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(46px,-34px) scale(1.09);}66%{transform:translate(-32px,22px) scale(.94);}}
.hero-content{position:relative;z-index:2;width:100%;padding:130px 0 96px;}
.eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text);background:var(--surface2);border:1px solid var(--border);padding:8px 15px;border-radius:999px;animation:fadeUp .9s both;}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);box-shadow:0 0 12px var(--accent3);}
.hero-title{font-family:var(--display);font-size:clamp(42px,7.4vw,80px);line-height:1.02;letter-spacing:-.03em;margin:22px 0 20px;font-weight:700;max-width:15ch;animation:fadeUp .9s .1s both;}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-sub{font-size:clamp(16px,2vw,20px);color:#c7c7d6;max-width:56ch;margin:0 0 34px;animation:fadeUp .9s .2s both;}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp .9s .3s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(26px);}to{opacity:1;transform:none;}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15px;padding:14px 28px;border-radius:999px;text-decoration:none;cursor:pointer;border:1px solid transparent;transition:transform .2s,box-shadow .2s,background .2s;}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 32px rgba(124,92,255,.42);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(124,92,255,.58);}
.btn-ghost{background:var(--surface2);color:var(--text);border-color:var(--border);}
.btn-ghost:hover{transform:translateY(-2px);background:var(--surface);}

/* MARQUEE */
.marquee{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:18px 0;background:rgba(255,255,255,.02);}
.marquee-track{display:flex;gap:42px;white-space:nowrap;width:max-content;animation:scroll 30s linear infinite;}
.chip{font-family:var(--display);font-size:15px;color:var(--muted);display:inline-flex;align-items:center;gap:11px;}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent2);}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* SECTIONS */
.section{padding:92px 0;}
.kicker{font-size:12.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--accent3);margin-bottom:12px;}
.section-title{font-family:var(--display);font-size:clamp(28px,4vw,44px);letter-spacing:-.02em;margin:0 0 12px;font-weight:700;}
.section-sub{color:var(--muted);font-size:17px;margin:0 0 44px;max-width:60ch;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;}
.stat-value{font-family:var(--display);font-size:clamp(30px,4vw,46px);font-weight:700;line-height:1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{font-weight:600;margin-top:10px;}
.stat-caption{color:var(--faint);font-size:13px;margin-top:3px;}
@media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr);}}

/* ABOUT */
.about-text p{font-size:18px;color:#d6d6e0;margin:0 0 16px;}

/* VIDEO GRID */
.video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;}
.video-card{position:relative;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);transition:transform .3s,box-shadow .3s,border-color .3s;}
.video-card:hover{transform:translateY(-6px);box-shadow:0 22px 54px rgba(0,0,0,.5);border-color:rgba(124,92,255,.5);}
.video-frame{aspect-ratio:16/9;width:100%;border:0;display:block;}
.video-ph{aspect-ratio:16/9;display:grid;place-items:center;background:linear-gradient(135deg,rgba(124,92,255,.4),rgba(255,92,138,.28));}
.video-ph .play{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);display:grid;place-items:center;font-size:24px;border:1px solid rgba(255,255,255,.32);transition:transform .3s;}
.video-card:hover .play{transform:scale(1.14);}
.video-info{padding:18px 20px;}
.video-info h3{font-family:var(--display);font-size:18px;margin:0 0 6px;}
.video-info p{margin:0;color:var(--muted);font-size:14px;}
@media(max-width:760px){.video-grid{grid-template-columns:1fr;}}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.service-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px;transition:transform .3s,border-color .3s;}
.service-card:hover{transform:translateY(-5px);border-color:rgba(67,229,255,.42);}
.service-icon{font-size:34px;margin-bottom:14px;}
.service-card h3{font-family:var(--display);font-size:19px;margin:0 0 8px;}
.service-card p{margin:0;color:var(--muted);font-size:14px;}
@media(max-width:760px){.services-grid{grid-template-columns:1fr;}}

/* CLASS */
.class-list{display:grid;gap:14px;margin-bottom:26px;}
.class-item{display:flex;gap:18px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;}
.class-num{flex:none;width:40px;height:40px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-family:var(--display);font-weight:700;color:#fff;}
.class-item h3{font-size:17px;margin:0 0 4px;}
.class-item p{margin:0;color:var(--muted);font-size:14px;}
.callout{display:flex;gap:16px;align-items:center;background:linear-gradient(120deg,rgba(124,92,255,.16),rgba(67,229,255,.09));border:1px solid rgba(124,92,255,.32);border-radius:var(--radius);padding:24px 26px;}
.callout .ico{font-size:32px;}
.callout strong{font-family:var(--display);font-size:16px;}
.callout p{margin:5px 0 0;color:var(--muted);font-size:14px;}

/* TESTIMONIALS */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.testi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 26px;position:relative;}
.testi-card::before{content:"\201C";position:absolute;top:2px;left:18px;font-size:66px;font-family:Georgia,serif;color:rgba(124,92,255,.38);line-height:1;}
.testi-quote{margin:20px 0;color:#e2e2ec;font-size:15px;}
.testi-name{font-family:var(--display);font-weight:600;}
.testi-meta{color:var(--faint);font-size:13px;}
@media(max-width:860px){.testi-grid{grid-template-columns:1fr;}}

/* CONTACT */
.contact-card{text-align:center;background:linear-gradient(135deg,rgba(124,92,255,.20),rgba(255,92,138,.12));border:1px solid var(--border);border-radius:28px;padding:66px 32px;}
.contact-card h2{font-family:var(--display);font-size:clamp(28px,4vw,42px);margin:0 0 14px;}
.contact-card p{color:var(--muted);max-width:48ch;margin:0 auto 30px;}
.contact-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:42px 0;text-align:center;color:var(--faint);font-size:14px;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1;transform:none;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;}.reveal{opacity:1;transform:none;}}

/* HERO MASCOT */
.hero-content{z-index:3;}
.hero-mascot{position:absolute;right:1%;bottom:0;z-index:2;width:46%;max-width:520px;pointer-events:none;}
.hero-mascot svg{width:100%;height:auto;display:block;filter:drop-shadow(0 16px 46px rgba(124,92,255,.28));}
.hero-mascot .scr{animation:scrglow 3.6s ease-in-out infinite;}
@keyframes scrglow{0%,100%{opacity:.45;}50%{opacity:.92;}}
.hero-mascot .steam{opacity:0;animation:steam 3.4s ease-in-out infinite;}
.hero-mascot .steam.s2{animation-delay:1.7s;}
@keyframes steam{0%{opacity:0;transform:translateY(4px) scaleY(.7);}35%{opacity:.55;}100%{opacity:0;transform:translateY(-16px) scaleY(1.15);}}
@media(max-width:860px){.hero-mascot{opacity:.16;width:86%;right:-14%;}}
@media (prefers-reduced-motion:reduce){.hero-mascot .steam{opacity:.4;animation:none;}.hero-mascot .scr{opacity:.8;animation:none;}}

/* HERO VIDEO OVERLAY (text kiri terbaca, maskot kanan terang) */
.hero--video .hero-overlay{background:linear-gradient(90deg,rgba(8,8,13,.95) 0%,rgba(8,8,13,.82) 30%,rgba(8,8,13,.42) 60%,rgba(8,8,13,.12) 82%,rgba(8,8,13,0) 100%),linear-gradient(0deg,var(--bg),transparent 32%);}
@media(max-width:760px){.hero--video .hero-overlay{background:linear-gradient(0deg,rgba(8,8,13,.94),rgba(8,8,13,.55));}}
</style>
</head>

function heroBg(v){
  if(v){var id=ytId(v);
    if(id)return '<div class="hero-video"><iframe src="https://www.youtube.com/embed/'+esc(id)+'?autoplay=1&mute=1&loop=1&playlist='+esc(id)+'&controls=0&showinfo=0&modestbranding=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>';

  var statsSec='<section class="section reveal" style="padding-top:64px;"><div class="container">'+statsHtml+'</div></section>';
  var aboutSec=sec("tentang","Profil",s.aboutTitle,"",'<div class="about-text">'+nl2p(s.aboutText)+'</div>');
  var videoHtml='<div class="video-grid">'+(s.videos||[]).map(function(v){var id=ytId(v.youtube);var media=id?'<iframe class="video-frame" src="https://www.youtube.com/embed/'+esc(id)+'" title="'+esc(v.title)+'" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>':'<div class="video-ph"><div class="play">\u25B6\uFE0F</div></div>';return '<article class="video-card">'+media+'<div class="video-info"><h3>'+esc(v.title)+'</h3><p>'+esc(v.desc)+'</p></div></article>';}).join("")+'</div>';
  var videoSec=sec("karya","Portofolio","Karya pilihan","Beberapa video yang sudah saya produksi \u2014 dari sinematik sampai konten iklan.",videoHtml);

  var serviceSec=sec("layanan","Layanan","Apa yang bisa saya bantu","Solusi konten video & animasi untuk brand dan kreator.",serviceHtml);
  var classHtml='<div class="class-list">'+(s.classItems||[]).map(function(c,i){return '<div class="class-item"><div class="class-num">'+(i+1)+'</div><div><h3>'+esc(c.title)+'</h3><p>'+esc(c.desc)+'</p></div></div>';}).join("")+'</div><div class="callout"><div class="ico">\uD83C\uDF93</div><div><strong>SERU DIGITAL LABS</strong><p>Ekosistem belajar berisi materi, tools SERA, dan komunitas untuk membantu kamu menguasai produksi video animasi AI.</p></div></div>';
  var classSec=sec("kelas","Belajar",s.classTitle,s.classText,classHtml);
  var testiHtml='<div class="testi-grid">'+(s.testimonials||[]).map(function(t){return '<div class="testi-card"><p class="testi-quote">'+esc(t.quote)+'</p><div class="testi-name">'+esc(t.name)+'</div><div class="testi-meta">'+esc(t.meta)+'</div></div>';}).join("")+'</div>';
  var testiSec=sec("testimoni","Testimoni","Apa kata klien & murid","",testiHtml);
  var contactBtns='<a class="btn btn-primary" href="mailto:'+esc(s.email)+'">\u2709\uFE0F Email Saya</a>';
  if(s.whatsapp)contactBtns+='<a class="btn btn-ghost" href="'+esc(s.whatsapp)+'" target="_blank" rel="noopener">\uD83D\uDCAC WhatsApp</a>';
  if(s.instagram)contactBtns+='<a class="btn btn-ghost" href="'+esc(s.instagram)+'" target="_blank" rel="noopener">Instagram</a>';
  if(s.tiktok)contactBtns+='<a class="btn btn-ghost" href="'+esc(s.tiktok)+'" target="_blank" rel="noopener">TikTok</a>';
  var contactSec='<section id="kontak" class="section reveal"><div class="container"><div class="contact-card"><h2>'+esc(s.contactTitle)+'</h2><p>'+esc(s.contactText)+'</p><div class="contact-cta">'+contactBtns+'</div></div></div></section>';
  var footer='<footer class="footer"><div class="container">\u00A9 2026 '+esc(s.brand)+' \u2014 SERU DIGITAL LABS. Menampilkan karya & berbagi ilmu video animasi AI.</div></footer>';
  document.getElementById("app").innerHTML=nav+hero+marquee+statsSec+aboutSec+videoSec+serviceSec+classSec+testiSec+contactSec+footer;
  initReveal();
}
function countUp(el){var raw=el.getAttribute("data-val")||el.textContent;var m=raw.match(/^(\D*)(\d+)(.*)$/);if(!m){el.textContent=raw;return;}var pre=m[1],num=parseInt(m[2],10),suf=m[3],dur=1100,start=null;function step(ts){if(!start)start=ts;var p=Math.min((ts-start)/dur,1);el.textContent=pre+Math.floor(p*num)+suf;if(p<1)requestAnimationFrame(step);else el.textContent=pre+num+suf;}requestAnimationFrame(step);}
function initReveal(){
  if(!("IntersectionObserver" in window)){[].forEach.call(document.querySelectorAll(".reveal"),function(e){e.classList.add("in");});return;}
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");if(e.target.querySelector){[].forEach.call(e.target.querySelectorAll(".stat-value"),function(sv){if(!sv.__done){sv.__done=1;countUp(sv);}});}io.unobserve(e.target);}});},{threshold:.14});
  [].forEach.call(document.querySelectorAll(".reveal"),function(e){io.observe(e);});
}
function boot(d){if(d){data=Object.assign({},DEFAULT_DATA,d);}render();}
if(window.fetch){fetch("data/content.json",{cache:"no-store"}).then(function(r){return r.ok?r.json():null;}).then(function(j){boot(j);}).catch(function(){boot(null);});}else{boot(null);}
})();
</script>
